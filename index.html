<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vignesh | Optimized Portfolio</title>
    
    <link rel="preconnect" href="https://prod.spline.design">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.94/build/spline-viewer.js"></script>
    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #007AFF;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }

        .loader-text { font-size: 1.2rem; font-weight: 800; letter-spacing: 8px; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        nav, main { opacity: 0; transform: translateY(20px); transition: opacity 1.5s ease, transform 1.5s ease; }
        .loaded nav, .loaded main { opacity: 1; transform: translateY(0); }

        html.lenis, html.lenis body { height: auto; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: #000; color: white; overflow-x: hidden; height: 400vh; }

        .bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #000; }

        .spline-scene {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            opacity: 0; transition: opacity 0.8s ease;
            display: none; /* KEY FIX: Only active scene is displayed */
            pointer-events: none;
        }

        nav { position: fixed; top: 0; width: 100%; padding: 25px; display: flex; justify-content: space-between; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.1rem; }

        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; position: relative; z-index: 10; }
        .hero { align-items: center; text-align: center; }
        .hero h1 { font-size: clamp(3rem, 10vw, 8rem); font-weight: 800; line-height: 0.9; }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); /* Lowered blur for mobile performance */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border); 
            padding: 30px; border-radius: 20px; 
        }

        .btn { display: inline-block; margin-top: 30px; padding: 15px 40px; background: white; color: black; text-decoration: none; border-radius: 50px; font-weight: 800; transition: 0.3s; }
        
        /* Mobile adjustment for big titles */
        @media (max-width: 768px) {
            section { padding: 0 5%; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-text">VIGNESH</div></div>

    <nav>
        <div class="logo">VIGNESH</div>
        <div style="opacity: 0.4; font-size: 0.7rem;">PORTFOLIO // 2026</div>
    </nav>

    <div class="bg-container">
        <div id="scene-1" class="spline-scene" style="display: block; opacity: 1;"><spline-viewer id="main-spline" url="https://prod.spline.design/EZSR1bLlfDTI4smJ/scene.splinecode"></spline-viewer></div>
        <div id="scene-2" class="spline-scene"><spline-viewer url="https://prod.spline.design/p-ZRUwDwFStpbG8L/scene.splinecode"></spline-viewer></div>
        <div id="scene-3" class="spline-scene"><spline-viewer events-target="global" url="https://prod.spline.design/Jzm-6QCYydFf-sM8/scene.splinecode"></spline-viewer></div>
        <div id="scene-4" class="spline-scene"><spline-viewer events-target="global" url="https://prod.spline.design/UDtF0IreE6wGU0nx/scene.splinecode"></spline-viewer></div>
    </div>

    <main>
        <section class="hero">
            <h1>VIGNESH</h1>
            <p style="margin-top: 15px; opacity: 0.5;">Creative Developer</p>
        </section>

        <section id="work">
            <h2 style="font-size: 2.5rem; margin-bottom: 30px;">Selected Work</h2>
            <div class="projects-grid">
                <div class="card"><h3>Project A</h3><p>Optimized 3D</p></div>
                <div class="card"><h3>Project B</h3><p>Fluid Motion</p></div>
            </div>
        </section>

        <section id="contact">
            <div>
                <h2 style="font-size: 4rem; line-height: 0.9;">LET'S <br>TALK.</h2>
                <a href="contact.html" class="btn">Get In Touch</a>
            </div>
        </section>

        <section style="text-align: center;">
            <h2 style="font-size: 2rem; opacity: 0.7;">THANKS FOR VISITING</h2>
            <p style="margin-top: 50px; font-size: 0.6rem; opacity: 0.3;">© 2026 VIGNESH</p>
        </section>
    </main>

    <script>
        // 1. LOADER LOGIC
        const mainSpline = document.getElementById('main-spline');
        const loader = document.getElementById('loader');

        function hideLoader() {
            if (loader.style.opacity !== '0') {
                loader.style.opacity = '0';
                document.body.classList.add('loaded');
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            }
        }
        mainSpline.addEventListener('load', hideLoader);
        setTimeout(hideLoader, 4000); // Fail-safe

        // 2. SMOOTH SCROLL (Optimized for Mobile)
        const lenis = new Lenis({ lerp: 0.1, touchMultiplier: 1.5 });
        function raf(time) {
            lenis.raf(time);
            updateScenes();
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 3. SCENE MANAGER (Mobile Performance Optimized)
        const scenes = [
            document.getElementById('scene-1'),
            document.getElementById('scene-2'),
            document.getElementById('scene-3'),
            document.getElementById('scene-4')
        ];

        function updateScenes() {
            const scrollY = window.scrollY;
            const vh = window.innerHeight;
            let activeIndex = 0;

            if (scrollY < vh * 0.7) activeIndex = 0;
            else if (scrollY < vh * 1.7) activeIndex = 1;
            else if (scrollY < vh * 2.7) activeIndex = 2;
            else activeIndex = 3;

            scenes.forEach((scene, i) => {
                if (i === activeIndex) {
                    if (scene.style.display !== 'block') {
                        scene.style.display = 'block';
                        // Small timeout to allow display:block to register before opacity
                        setTimeout(() => { scene.style.opacity = "1"; }, 10);
                    }
                } else {
                    scene.style.opacity = "0";
                    // Only hide completely after fade out is done
                    setTimeout(() => { 
                        if (scene.style.opacity === "0") scene.style.display = 'none'; 
                    }, 800);
                }
            });

            // Rotation logic for Scene 2
            if (activeIndex === 1) {
                const rot = (scrollY - vh * 0.7) * 0.1;
                scenes[1].style.transform = `scale(1.1) rotate(${rot}deg)`;
            }
        }

        // Watermark Remover
        setInterval(() => {
            document.querySelectorAll('spline-viewer').forEach(v => {
                if (v.shadowRoot) {
                    const l = v.shadowRoot.querySelector('#logo');
                    if (l) l.style.display = 'none';
                }
            });
        }, 1000);
    </script>
</body>
</html>
