<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vignesh | Portfolio</title>
    
    <!-- Pre-connect for speed -->
    <link rel="preconnect" href="https://prod.spline.design">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.94/build/spline-viewer.js"></script>
    
    <!-- Lottie Player Script -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    
    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #007AFF;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* --- LOTTIE LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease;
        }

        dotlottie-player {
            width: 300px; 
            height: 300px;
        }

        /* --- ENTRANCE ANIMATION --- */
        nav, main { 
            opacity: 0; 
            transform: translateY(30px); 
            transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1), transform 2s cubic-bezier(0.16, 1, 0.3, 1); 
            pointer-events: none;
        }
        .loaded nav, .loaded main { opacity: 1; transform: translateY(0); pointer-events: auto; }

        /* --- BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: #000; color: white; overflow-x: hidden; height: 400vh; }
        html.lenis, html.lenis body { height: auto; }

        /* --- BACKGROUND ENGINE --- */
        .bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #000; }
        .spline-scene {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            opacity: 0; transition: opacity 0.8s ease;
            display: none; pointer-events: none; will-change: opacity, transform, filter;
        }

        /* Reduced brightness for first background */
        #scene-1 { display: block; opacity: 1; filter: brightness(0.4) contrast(1.1); }

        /* --- UI --- */
        nav { position: fixed; top: 0; width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }

        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; position: relative; z-index: 10; }
        .hero { align-items: center; text-align: center; }
        .hero h1 { font-size: clamp(3.5rem, 12vw, 9rem); font-weight: 800; line-height: 0.8; }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .card { 
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 40px; border-radius: 30px; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .btn { 
            display: inline-block; margin-top: 30px; padding: 18px 45px; 
            background: white; color: black; text-decoration: none; 
            border-radius: 100px; font-weight: 800; transition: 0.4s; 
        }
        .btn:hover { background: var(--accent); color: white; transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,122,255,0.3); }

        .footer-text { text-align: center; }
        .socials { margin-top: 30px; display: flex; gap: 20px; justify-content: center; opacity: 0.4; font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            section { padding: 0 5%; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- LOTTIE LOADER -->
    <div id="loader">
        <dotlottie-player 
            src="loading.lottie" 
            background="transparent" 
            speed="1" 
            loop 
            autoplay>
        </dotlottie-player>
    </div>

    <nav>
        <div class="logo">VIGNESH</div>
        <div style="opacity: 0.4; font-size: 0.7rem; letter-spacing: 2px;">V.02 // 120 FPS</div>
    </nav>

    <div class="bg-container">
        <div id="scene-1" class="spline-scene"><spline-viewer id="main-spline" url="https://prod.spline.design/EZSR1bLlfDTI4smJ/scene.splinecode"></spline-viewer></div>
        <div id="scene-2" class="spline-scene"><spline-viewer url="https://prod.spline.design/p-ZRUwDwFStpbG8L/scene.splinecode"></spline-viewer></div>
        <div id="scene-3" class="spline-scene"><spline-viewer events-target="global" url="https://prod.spline.design/Jzm-6QCYydFf-sM8/scene.splinecode"></spline-viewer></div>
        <div id="scene-4" class="spline-scene"><spline-viewer events-target="global" url="https://prod.spline.design/UDtF0IreE6wGU0nx/scene.splinecode"></spline-viewer></div>
    </div>

    <main>
        <section class="hero">
            <h1>VIGNESH</h1>
            <p style="margin-top: 20px; opacity: 0.5; letter-spacing: 4px;">CREATIVE DEVELOPER</p>
        </section>

        <section id="work">
            <h2 style="font-size: 3rem; margin-bottom: 40px;">Selected Work</h2>
            <div class="projects-grid">
                <div class="card"><h3>3D Visuals</h3><p>Interactive web experiences.</p></div>
                <div class="card"><h3>Modern UI</h3><p>Optimized for 120Hz motion.</p></div>
            </div>
        </section>

        <section id="contact">
            <div>
                <h2 style="font-size: 5rem; line-height: 0.9;">LET'S <br>TALK.</h2>
                <a href="contact.html" class="btn">Get In Touch</a>
            </div>
        </section>

        <section class="footer-text">
            <h2 style="font-size: 2rem; opacity: 0.7;">THANKS FOR EXPLORING</h2>
            <div class="socials"><span>LINKEDIN</span> / <span>GITHUB</span> / <span>X</span></div>
            <p style="margin-top: 80px; font-size: 0.6rem; opacity: 0.2;">© 2026 VIGNESH</p>
        </section>
    </main>

    <script>
        // --- LOADER LOGIC ---
        const mainSpline = document.getElementById('main-spline');
        const loader = document.getElementById('loader');

        function hideLoader() {
            if (loader.style.opacity !== '0') {
                loader.style.opacity = '0';
                // Trigger the slow fade-in of content
                document.body.classList.add('loaded');
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 1000);
            }
        }

        // 1. Standard Load Event
        mainSpline.addEventListener('load', hideLoader);

        // 2. Polling Check (Checks if 3D canvas exists)
        const checkCanvas = setInterval(() => {
            if (mainSpline.shadowRoot && mainSpline.shadowRoot.querySelector('canvas')) {
                hideLoader();
                clearInterval(checkCanvas);
            }
        }, 500);

        // 3. Emergency Timeout (7 seconds)
        setTimeout(() => {
            hideLoader();
            clearInterval(checkCanvas);
        }, 7000);

        // --- SMOOTH SCROLL (LENIS) ---
        const lenis = new Lenis({ lerp: 0.1, touchMultiplier: 1.2 });
        function raf(time) {
            lenis.raf(time);
            updateScenes();
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- SCENE MANAGER ---
        const scenes = [
            document.getElementById('scene-1'), 
            document.getElementById('scene-2'), 
            document.getElementById('scene-3'), 
            document.getElementById('scene-4')
        ];

        function updateScenes() {
            const scrollY = window.scrollY, vh = window.innerHeight;
            let active = 0;
            if (scrollY < vh * 0.7) active = 0;
            else if (scrollY < vh * 1.7) active = 1;
            else if (scrollY < vh * 2.7) active = 2;
            else active = 3;

            scenes.forEach((s, i) => {
                if (i === active) {
                    if (s.style.display !== 'block') { 
                        s.style.display = 'block'; 
                        setTimeout(() => s.style.opacity = "1", 10); 
                    }
                } else {
                    s.style.opacity = "0";
                    setTimeout(() => { 
                        if(s.style.opacity === "0") s.style.display = 'none'; 
                    }, 800);
                }
            });

            if (active === 1) {
                const rot = (scrollY - vh * 0.7) * 0.12;
                scenes[1].style.transform = `scale(1.2) rotate(${rot}deg) translateZ(0)`;
            }
        }

        // --- WATERMARK REMOVER ---
        setInterval(() => {
            document.querySelectorAll('spline-viewer').forEach(v => {
                if (v.shadowRoot) {
                    const l = v.shadowRoot.querySelector('#logo');
                    if (l) l.style.display = 'none';
                }
            });
        }, 1000);
    </script>
</body>
</html>
